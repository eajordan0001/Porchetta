<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿德師傅 - 後台看板</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* 📐 全螢幕嚴格鎖定，防止手機整頁滑動變形 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: "Segoe Script", "Apple Chancery", cursive, "Noto Sans TC", sans-serif;
            background-color: #f0e6d2;
            color: #4a2f1c;
            box-sizing: border-box;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        h1 {
            text-align: center;
            font-size: 18px;
            margin: 0 0 5px 0;
            padding-bottom: 2px;
            border-bottom: 3px solid #a67c52;
            flex-shrink: 0;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 5px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 13px;
            flex-shrink: 0;
        }
        .refresh-btn {
            background-color: #4a2f1c;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        /* 📐 重新調配三大區塊高度：55% / 15% / 30% */
        .dashboard-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: calc(100vh - 80px); /* 扣除頂部空間 */
            gap: 8px;
        }

        /* ==========================================
           【區域一：佔 55% 的動態金字塔明細區】
           ========================================== */
        .section-details {
            background-color: #ffffff;
            border: 3px solid #a67c52;
            border-radius: 8px;
            padding: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            box-sizing: border-box;
            
            flex: 55;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .section-details h2 {
            font-size: 14px;
            margin: 0 0 6px 0;
            color: #a67c52;
            border-bottom: 1px dashed #a67c52;
            padding-bottom: 2px;
            flex-shrink: 0;
        }
        #orders-container {
            flex: 1;
            overflow-y: auto; /* 超出的單號自己在這裡滾動 */
            padding-right: 2px;
        }

        /* 👑 金字塔動態卡片樣式變形計 */
        .order-card {
            background: #f7f3e9;
            border-left: 6px solid #d97706;
            margin-bottom: 8px;
            border-radius: 4px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        
        /* 🥇 置頂最大單 (特大醒目) */
        .card-rank-0 {
            border-left-width: 10px;
            background: #fffdf5;
            border-color: #dc2626; /* 超緊急紅色 */
            padding: 14px;
            box-shadow: 0 4px 8px rgba(220,38,38,0.15);
        }
        .card-rank-0 .order-header { font-size: 20px; color: #dc2626; }
        .card-rank-0 .order-items-list { font-size: 16px; line-height: 1.5; }
        .card-rank-0 .order-item-note { font-size: 14px; padding: 6px; }

        /* 🥈 第二張單 (中等) */
        .card-rank-1 {
            border-left-width: 7px;
            background: #faf7f0;
            border-color: #d97706; /* 橘色提醒 */
            padding: 10px;
        }
        .card-rank-1 .order-header { font-size: 16px; }
        .card-rank-1 .order-items-list { font-size: 14px; }
        .card-rank-1 .order-item-note { font-size: 12px; }

        /* 🥉 其餘後續單 (精簡小巧) */
        .card-rank-rest {
            border-left-width: 4px;
            background: #f3eee1;
            border-color: #a67c52; /* 基礎咖啡色 */
            padding: 6px 10px;
        }
        .card-rank-rest .order-header { font-size: 14px; margin-bottom: 2px; }
        .card-rank-rest .order-items-list { font-size: 13px; margin: 2px 0; }
        .card-rank-rest .order-item-note { font-size: 11px; padding: 2px 5px; }

        /* 完成單樣式 */
        .order-card.status-success {
            border-left-color: #16a34a !important;
            background: #f0fdf4 !important;
            opacity: 0.7;
            padding: 6px 10px !important;
        }
        .order-card.status-success .order-header { font-size: 14px !important; color: #16a34a !important; }
        .order-card.status-success .order-items-list { font-size: 13px !important; }

        .order-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .order-items-list {
            margin: 4px 0;
            padding-left: 15px;
        }
        .order-item-note {
            display: block;
            background-color: #ffeec2;
            color: #b45309;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 3px;
        }
        
        /* 🎯 成功交易四字等寬固定寬度 (20px) */
        .status-label {
            font-size: 20px;
            font-weight: bold;
            display: inline-block;
            text-align: justify;
            text-align-last: justify;
            width: 4.5rem; 
        }
        .action-btn {
            background-color: #16a34a;
            color: white;
            border: none;
            padding: 5px 10px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
        }

        /* ==========================================
           【區域二：佔 13% 的數據統計區】
           ========================================== */
        .section-stats {
            background-color: #ffffff;
            border: 2px solid #a67c52;
            border-radius: 8px;
            padding: 6px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-sizing: border-box;
            
            flex: 13;
            flex-shrink: 0;
        }
        .stat-box { text-align: center; }
        .stat-box .title { font-size: 11px; color: #666; }
        .stat-box .num { font-size: 18px; font-weight: bold; color: #4a2f1c; margin-top: 1px; }

        /* ==========================================
           【區域三：佔 32% 的歷史流水帳區 - 徹底修復滾動】
           ========================================== */
        .section-history {
            background-color: #e6dfc7;
            border-radius: 8px;
            padding: 8px;
            box-sizing: border-box;
            
            flex: 32; /* 分配 32% 高度 */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 防止溢出外部 */
        }
        .section-history h2 {
            font-size: 14px;
            margin: 0 0 5px 0;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }
        /* 🛠️ 關鍵修正：給予表格外層一個獨立的滾動抽屜 */
        .table-scroll {
            flex: 1;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; /* 優化手機滑動流暢度 */
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            padding: 2px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            table-layout: fixed;
        }
        .history-table th {
            background-color: #4a2f1c;
            color: #ffffff;
            position: sticky;
            top: 0; /* 表頭吸頂 */
            padding: 4px 2px;
            z-index: 10;
        }
        .history-table td {
            padding: 6px 2px;
            text-align: left;
            border-bottom: 1px solid #b5a88f;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <h1>👨‍🍳 阿德師傅 - 即時出單系統</h1>

    <div class="controls">
        <div>狀態: <span id="sync-status" style="color: green; font-weight: bold;">● 即時連線中</span></div>
        <button class="refresh-btn" onclick="fetchOrders()">🔄 手動刷新</button>
    </div>

    <div class="dashboard-container">
        
        <div class="section-details">
            <h2>📋 當前接單明細 (金字塔排版：先到新單置頂放大)</h2>
            <div id="orders-container">正在下載最新出單資料...</div>
        </div>

        <div class="section-stats">
            <div class="stat-box">
                <div class="title">⏳ 待做訂單</div>
                <div class="num" id="stat-pending">0</div>
            </div>
            <div class="stat-box" style="border-left: 1px solid #ccc; border-right: 1px solid #ccc; padding: 0 10px;">
                <div class="title">✅ 已過單</div>
                <div class="num" id="stat-completed" style="color: #16a34a;">0</div>
            </div>
            <div class="stat-box">
                <div class="title">💰 今日營收</div>
                <div class="num" id="stat-revenue" style="color: #b45309;">$0</div>
            </div>
        </div>

        <div class="section-history">
            <h2><span>📜 歷史出單流水帳</span> <span id="history-count" style="font-size: 12px; color:#555;">共 0 筆</span></h2>
            <div class="table-scroll">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">單號</th>
                            <th style="width: 60%;">品項/客製摘要</th>
                            <th style="width: 20%;">金額</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr>
                            <td colspan="3" style="text-align: center; color: #888; padding: 10px;">暫無紀錄</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const API_URL = 'https://xylwvlidaidtkvnivnrr.supabase.co/rest/v1/orders';
        const API_KEY = 'sb_publishable_RHa_jkWf5jWrxu6v8wo29A_8_tGr5Ar';

        let completedOrderIds = JSON.parse(localStorage.getItem('completed_orders') || '[]');

        async function fetchOrders() {
            try {
                document.getElementById('sync-status').textContent = '🔄 讀取中...';
                document.getElementById('sync-status').style.color = '#b45309';

                const response = await fetch(`${API_URL}?order=id.desc`, {
                    method: 'GET',
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error("後台讀取失敗");
                const orders = await response.json();

                renderDashboard(orders);

                document.getElementById('sync-status').textContent = '● 即時連線中';
                document.getElementById('sync-status').style.color = 'green';
            } catch (err) {
                console.error(err);
                document.getElementById('sync-status').textContent = '❌ 連線失敗';
                document.getElementById('sync-status').style.color = 'red';
            }
        }

        function renderDashboard(orders) {
            const container = document.getElementById('orders-container');
            const tbody = document.getElementById('history-tbody');
            
            container.innerHTML = '';
            tbody.innerHTML = '';

            let pendingCount = 0;
            let completedCount = 0;
            let totalRevenue = 0;

            if (orders.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">目前尚無人點餐。</div>';
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888;">暫無紀錄</td></tr>';
                return;
            }

            // 🛠️ 金字塔關鍵邏輯：
            // 為了讓最先點單（單號最小）的「未完成」訂單在最上面放大顯示，我們先把未完成跟已完成分開。
            let pendingOrders = orders.filter(o => !completedOrderIds.includes(o.id)).sort((a, b) => a.id - b.id); // 未完成：小單號（舊單）在前
            let completedOrders = orders.filter(o => completedOrderIds.includes(o.id)).sort((a, b) => b.id - a.id); // 已完成：新單在前

            // 合併在一起渲染，讓未完成永遠置頂，已完成壓在下方
            let sortedOrders = [...pendingOrders, ...completedOrders];

            let pendingIndex = 0; // 用來計算目前是第幾個「未完成」的單子

            sortedOrders.forEach(order => {
                const formattedNum = String(order.id).padStart(3, '0');
                const isFinished = completedOrderIds.includes(order.id);

                let rankClass = "card-rank-rest"; // 預設為小尺寸

                if (isFinished) {
                    completedCount++;
                    totalRevenue += order.total_price;
                } else {
                    pendingCount++;
                    // 👑 依據未完成的順序分派大、中、小尺寸
                    if (pendingIndex === 0) {
                        rankClass = "card-rank-0"; // 最久的第一張未完成單 -> 顯示特大
                    } else if (pendingIndex === 1) {
                        rankClass = "card-rank-1"; // 第二張未完成單 -> 顯示中等
                    } else {
                        rankClass = "card-rank-rest"; // 其餘未完成單 -> 顯示小
                    }
                    pendingIndex++;
                }

                // --- 1. 繪製卡片 ---
                const card = document.createElement('div');
                card.className = `order-card ${rankClass} ${isFinished ? 'status-success' : ''}`;
                
                let itemsHtml = '';
                if (Array.isArray(order.items)) {
                    order.items.forEach(i => {
                        let customText = i.customization && i.customization.length > 0 ? ` [${i.customization.join(', ')}]` : '';
                        let noteText = i.note ? `<span class="order-item-note">✍️ 客人備註：${i.note}</span>` : '';
                        
                        itemsHtml += `
                            <li>
                                <strong>${i.item === 'Porchetta' ? '義式脆皮烤豬' : '但丁三明治'}</strong> ${i.size || ''} 
                                <span style="color:#b45309;">${customText}</span>
                                ${noteText}
                            </li>`;
                    });
                }

                let actionButtonHtml = '';
                if (!isFinished) {
                    actionButtonHtml = `<button class="action-btn" onclick="localMarkAsComplete(${order.id})">✔️ 完成出餐</button>`;
                } else {
                    actionButtonHtml = `<span class="status-label" style="color: #16a34a;">交易成功</span>`;
                }

                card.innerHTML = `
                    <div class="order-header">
                        <span>單號 #${formattedNum} ${!isFinished && rankClass==='card-rank-0'?'🔥 優先製作':''}</span>
                        <span style="color:#b45309;">$${order.total_price}</span>
                    </div>
                    <ul class="order-items-list">${itemsHtml}</ul>
                    <div style="text-align: right; margin-top: 4px;">
                        ${actionButtonHtml}
                    </div>
                `;
                container.appendChild(card);

                // --- 2. 繪製底部歷史流水帳 ---
                const tr = document.createElement('tr');
                let summary = '';
                if (Array.isArray(order.items) && order.items.length > 0) {
                    summary = order.items.map(i => i.item === 'Porchetta' ? '烤豬' : '三明治').join('+');
                    if (order.items.some(i => i.note)) summary += '(備註)';
                }

                tr.innerHTML = `
                    <td><strong>#${formattedNum}</strong></td>
                    <td style="color:#555;">${summary}</td>
                    <td><span style="color:${isFinished ? 'green':'#b45309'}; font-weight:bold;">$${order.total_price}</span></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stat-pending').textContent = pendingCount;
            document.getElementById('stat-completed').textContent = completedCount;
            document.getElementById('stat-revenue').textContent = `$${totalRevenue}`;
            document.getElementById('history-count').textContent = `共 ${orders.length} 筆`;
        }

        function localMarkAsComplete(orderId) {
            if (!completedOrderIds.includes(orderId)) {
                completedOrderIds.push(orderId);
                localStorage.setItem('completed_orders', JSON.stringify(completedOrderIds));
            }
            fetchOrders();
        }

        setInterval(fetchOrders, 6000);
        window.onload = fetchOrders;
    </script>
</body>
</html>
