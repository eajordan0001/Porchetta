<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿德師傅 - 現場出單管理系統</title>
    <style>
        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #f0e6d2;
            color: #4a2f1c;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            background-color: #ffffff;
            padding: 15px;
            border: 5px solid #a67c52;
            border-radius: 8px;
            position: relative;
        }
        h1 { margin: 0; font-size: 24px; }
        
        /* ✨【全新優化】醒目的實時時鐘外框與字體 */
        .clock-box {
            border: 4px solid #16a34a; /* 醒目的翠綠色外框 */
            background-color: #f0fdf4; /* 淡淡的綠色底色，增加對比 */
            border-radius: 10px;
            padding: 12px 20px;
            margin: 15px auto;
            display: inline-block; /* 讓外框寬度剛好符合時間大小 */
            box-shadow: 0 0 15px rgba(22, 163, 74, 0.4); /* 霓虹發光感，極度吸睛 */
        }
        #current-time-clock {
            font-size: 38px; /* 特大字體 */
            font-weight: 900;
            color: #16a34a; /* 綠色高對比字體 */
            font-family: monospace; /* 使用等寬字體，防止秒數跳動時文字抖動 */
            letter-spacing: 2px;
            margin: 0;
        }

        /* 🚧 收攤按鈕樣式 */
        .settle-btn {
            background-color: #7c2d12;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 0 #431407;
        }
        .settle-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #431407;
        }

        .order-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* 訂單卡片基礎樣式 */
        .order-card {
            background-color: #f7f3e9;
            border: 3px solid #a67c52;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        /* ✨【優先出餐優化】 */
        .order-list .order-card:first-child {
            border: 5px solid #dc2626; 
            background-color: #fffef0;
        }
        .order-list .order-card:first-child .priority-badge {
            display: inline-block;
            background-color: #dc2626;
            color: #ffffff;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 24px; 
            margin-bottom: 10px;
            animation: blink 1.5s infinite;
        }
        .order-list .order-card:first-child .order-id {
            font-size: 36px; 
            color: #dc2626;
            font-weight: 900;
        }
        .order-list .order-card:first-child .order-time,
        .order-list .order-card:first-child .item-line {
            font-size: 22px; 
            line-height: 1.6;
        }

        .priority-badge { display: none; }
        .order-id {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px dashed #a67c52;
            padding-bottom: 5px;
        }
        .order-time {
            font-size: 14px;
            color: #78350f;
            margin-bottom: 15px;
        }
        .order-items {
            margin-bottom: 20px;
        }
        .item-line {
            font-size: 16px;
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 3px solid #4a2f1c;
        }

        .complete-btn {
            display: block;
            width: 100%;
            padding: 20px 10px; 
            background-color: #16a34a;
            color: #ffffff;
            border: none;
            font-size: 24px; 
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 0 #15803d;
            text-align: center;
            user-select: none;
        }
        .complete-btn:active {
            background-color: #15803d;
            box-shadow: 0 1px 0 #15803d;
            transform: translateY(3px);
        }

        /* 📋 報表燈箱彈出視窗樣式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background-color: #fdfbf7;
            border: 4px solid #7c2d12;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            color: #7c2d12;
            margin-bottom: 15px;
            text-align: center;
        }
        .report-textarea {
            width: 100%;
            height: 250px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid #a67c52;
            background-color: #fff;
            border-radius: 6px;
            resize: none;
            color: #333;
        }
        .modal-btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .modal-btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }
        .copy-btn { background-color: #16a34a; color: white; }
        .close-btn { background-color: #6b7280; color: white; }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>👨‍🍳 阿德師傅餐車 - 現場出單明細</h1>
            
            <div class="clock-box">
                <div id="current-time-clock">
