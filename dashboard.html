<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿德師傅 - 現場出單管理系統</title>
    <style>
        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #f0e6d2;
            color: #4a2f1c;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            background-color: #ffffff;
            padding: 15px;
            border: 5px solid #a67c52;
            border-radius: 8px;
        }
        h1 { margin: 0; font-size: 24px; }
        
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* 訂單卡片基礎樣式 */
        .order-card {
            background-color: #f7f3e9;
            border: 3px solid #a67c52;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        /* ✨【優先出餐優化】：最上面第一筆（優先）的特大號字體樣式 */
        .order-list .order-card:first-child {
            border: 5px solid #dc2626; 
            background-color: #fffef0;
        }
        .order-list .order-card:first-child .priority-badge {
            display: inline-block;
            background-color: #dc2626;
            color: #ffffff;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 24px; 
            margin-bottom: 10px;
            animation: blink 1.5s infinite;
        }
        .order-list .order-card:first-child .order-id {
            font-size: 36px; 
            color: #dc2626;
            font-weight: 900;
        }
        .order-list .order-card:first-child .order-time,
        .order-list .order-card:first-child .item-line {
            font-size: 22px; 
            line-height: 1.6;
        }

        /* 平常訂單的常規字體大小 */
        .priority-badge { display: none; }
        .order-id {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px dashed #a67c52;
            padding-bottom: 5px;
        }
        .order-time {
            font-size: 14px;
            color: #78350f;
            margin-bottom: 15px;
        }
        .order-items {
            margin-bottom: 20px;
        }
        .item-line {
            font-size: 16px;
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 3px solid #4a2f1c;
        }

        /* ✨【完成出餐按鈕加大】，方便廚師操作 */
        .complete-btn {
            display: block;
            width: 100%;
            padding: 20px 10px; 
            background-color: #16a34a;
            color: #ffffff;
            border: none;
            font-size: 24px; 
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 0 #15803d;
            text-align: center;
            user-select: none;
        }
        .complete-btn:active {
            background-color: #15803d;
            box-shadow: 0 1px 0 #15803d;
            transform: translateY(3px);
        }

        .order-list .order-card:first-child .complete-btn {
            background-color: #dc2626;
            box-shadow: 0 4px 0 #991b1b;
        }
        .order-list .order-card:first-child .complete-btn:active {
            background-color: #991b1b;
            box-shadow: 0 1px 0 #991b1b;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>👨‍🍳 阿德師傅餐車 - 現場出單明細</h1>
            <div id="loading-status" style="font-size:14px; color:#666; margin-top:5px;">正在連線資料庫...</div>
        </header>

        <div class="order-list" id="order-container">
            </div>
    </div>

    <script>
        const API_URL = 'https://xylwvlidaidtkvnivnrr.supabase.co/rest/v1/orders';
        const API_KEY = 'sb_publishable_RHa_jkWf5jWrxu6v8wo29A_8_tGr5Ar';

        // 🔄 初始化載入與即時重整
        async function fetchOrders() {
            try {
                document.getElementById('loading-status').textContent = "正在即時更新訂單中...";
                
                // 1. 一次性撈取當天及之前所有待處理的訂單（依照建立時間 asc 排序，最舊、最先點的在最上面）
                const response = await fetch(`${API_URL}?status=eq.pending&order=created_at.asc`, {
                    method: 'GET',
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`
                    }
                });

                if (!response.ok) throw new Error("資料庫連線失敗");
                const pendingOrders = await response.json();
                
                // 2. 如果完全沒訂單，直接去渲染空畫面
                if (pendingOrders.length === 0) {
                    renderOrderList([]);
                    document.getElementById('loading-status').textContent = `最後更新時間：${new Date().toLocaleTimeString()} (每 10 秒自動同步)`;
                    return;
                }

                // 3. 🚀【超級優化核心】：免重覆查詢，直接用首單 ID 偏移量或當天時間推算
                // 為了完美對齊前端網頁算出來的 001、002...
                // 我們直接去查今天「第一筆訂單的原始 ID 是多少」
                const now = new Date();
                const twTime = new Date(now.getTime() + (8 * 60 * 60 * 1000));
                const todayStr = twTime.toISOString().split('T')[0];

                // 只向資料庫問一次：今天最早的那張單 ID 是幾號
                const firstOrderRes = await fetch(`${API_URL}?created_at=gte.${todayStr}T00:00:00Z&order=id.asc&limit=1&select=id`, {
                    method: 'GET',
                    headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}` }
                });

                let baseId = 0;
                if (firstOrderRes.ok) {
                    const firstOrderData = await firstOrderRes.json();
                    if (firstOrderData.length > 0) {
                        baseId = firstOrderData[0].id; // 抓到今天第一單的絕對流水號 (例如 15)
                    }
                }

                // 4. 計算出每筆 pending 訂單在今天的動態序號
                const finalRenderedOrders = pendingOrders.map(order => {
                    let dailyNum = 1;
                    if (baseId > 0 && order.id >= baseId) {
                        // 今天的單號 = 目前訂單 ID - 今天第一單 ID + 1
                        dailyNum = (order.id - baseId) + 1;
                    } else {
                        // 萬一是昨天殘留至今未核銷的單子，給予獨立提示或維持原始偏移
                        dailyNum = 1;
                    }
                    const formattedNum = String(dailyNum).padStart(3, '0');
                    return { ...order, dailyNumber: formattedNum };
                });

                renderOrderList(finalRenderedOrders);
                document.getElementById('loading-status').textContent = `最後更新時間：${new Date().toLocaleTimeString()} (每 10 秒自動同步)`;

            } catch (error) {
                console.error(error);
                document.getElementById('loading-status').textContent = "⚠️ 連線失敗，正試圖重新連線中...";
            }
        }

        // 🎨 渲染出單畫面到畫面上
        function renderOrderList(orders) {
            const container = document.getElementById('order-container');
            container.innerHTML = '';

            if (orders.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; font-size:18px; color:#888; background:#fff; border-radius:8px; border:2px dashed #a67c52;">🎉 報告主廚！目前沒有未出餐的訂單，可以稍作休息！</div>';
                return;
            }

            orders.forEach((order, index) => {
                const card = document.createElement('div');
                card.className = 'order-card';

                // 解析時間
                const time = new Date(order.created_at).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
                
                // 生成品項明細清單
                let itemsHtml = '';
                if (Array.isArray(order.items)) {
                    order.items.forEach(item => {
                        let customStr = item.customization && item.customization.length > 0 ? ` [${item.customization.join(', ')}]` : '';
                        let noteStr = item.note ? ` <span style="color:#b45309; font-weight:bold;">(備註: ${item.note})</span>` : '';
                        itemsHtml += `<div class="item-line">🔹 ${item.item === 'Porchetta' ? '義式脆皮烤豬' : '但丁三明治'} ${item.size} x 1區 - $${item.price}${customStr}${noteStr}</div>`;
                    });
                }

                // 填入卡片內容
                card.innerHTML = `
                    <div class="priority-badge">🚨 優先出餐</div>
                    <div class="order-id">今日編號：#${order.dailyNumber}</div>
                    <div class="order-time">收單時間：${time} ｜ 總金額：$${order.total_price}</div>
                    <div class="order-items">${itemsHtml}</div>
                    <button class="complete-btn" onclick="completeOrder('${order.id}', this)">✔ 完成出餐</button>
                `;

                container.appendChild(card);
            });
        }

        // 🚀 廚師點擊「完成出餐」按鈕
        async function completeOrder(orderId, buttonEl) {
            if (!confirm("確定這筆餐點已經製作完成，要核銷出單嗎？")) return;
            
            buttonEl.disabled = true;
            buttonEl.textContent = "⏱ 處理中...";

            try {
                const response = await fetch(`${API_URL}?id=eq.${orderId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({ status: 'completed' })
                });

                if (response.ok) {
                    fetchOrders();
                } else {
                    alert("核銷失敗，請重新再試一次！");
                    buttonEl.disabled = false;
                    buttonEl.textContent = "✔ 完成出餐";
                }
            } catch (error) {
                alert("網路異常，無法變更出餐狀態！");
                buttonEl.disabled = false;
                buttonEl.textContent = "✔ 完成出餐";
            }
        }

        // ⏱ 設定每 10 秒鐘自動同步一次
        fetchOrders();
        setInterval(fetchOrders, 10000);
    </script>
</body>
</html>
