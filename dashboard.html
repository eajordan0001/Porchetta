<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿德師傅 - 後台看板</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* 📐 強制全螢幕鎖定，不允許整頁上下亂滾動 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            font-family: "Segoe Script", "Apple Chancery", cursive, "Noto Sans TC", sans-serif;
            background-color: #f0e6d2;
            color: #4a2f1c;
            box-sizing: border-box;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            margin: 0 0 8px 0;
            padding-bottom: 3px;
            border-bottom: 3px solid #a67c52;
            flex-shrink: 0;
        }

        /* 控制列固定不縮放 */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 6px 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 14px;
            flex-shrink: 0;
        }
        .refresh-btn {
            background-color: #4a2f1c;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
        }

        /* 📐 核心修復：強制彈性垂直分配，剛好塞滿一個螢幕 */
        .dashboard-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: calc(100vh - 90px); /* 扣除標題與控制列的剩餘高度 */
            gap: 10px;
        }

        /* ==========================================
           【區域一：佔 50% 高度的點單明細】
           ========================================== */
        .section-details {
            background-color: #ffffff;
            border: 3px solid #a67c52;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            box-sizing: border-box;
            
            flex: 50; /* 分配 50% */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 防止撐破外框 */
        }
        .section-details h2 {
            font-size: 16px;
            margin: 0 0 8px 0;
            color: #a67c52;
            border-bottom: 1px dashed #a67c52;
            padding-bottom: 3px;
            flex-shrink: 0;
        }
        /* 讓訂單列表自己在這裡面滾動 */
        #orders-container {
            flex: 1;
            overflow-y: auto; 
            padding-right: 2px;
        }

        .order-card {
            background: #f7f3e9;
            border-left: 6px solid #d97706;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
        }
        .order-card.status-success {
            border-left-color: #16a34a;
            background: #f0fdf4;
            opacity: 0.85;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 4px;
        }
        .order-items-list {
            font-size: 14px;
            margin: 4px 0;
            padding-left: 15px;
        }
        .order-item-note {
            display: block;
            background-color: #ffeec2;
            color: #b45309;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 3px;
            font-weight: bold;
        }
        
        /* 🎯 成功交易四字等寬字體樣式 (20px) */
        .status-label {
            font-size: 20px;
            font-weight: bold;
            display: inline-block;
            text-align: justify;
            text-align-last: justify;
            width: 4.5rem; 
        }
        .action-btn {
            background-color: #16a34a;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
        }

        /* ==========================================
           【區域二：佔 15% 高度的數據統計】
           ========================================== */
        .section-stats {
            background-color: #ffffff;
            border: 2px solid #a67c52;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-sizing: border-box;
            
            flex: 15; /* 分配 15% 高度 */
            flex-shrink: 0;
        }
        .stat-box { text-align: center; }
        .stat-box .title { font-size: 12px; color: #666; }
        .stat-box .num { font-size: 20px; font-weight: bold; color: #4a2f1c; margin-top: 2px; }

        /* ==========================================
           【區域三：佔 35% 高度的歷史流水帳】
           ========================================== */
        .section-history {
            background-color: #e6dfc7;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            
            flex: 35; /* 分配 35% */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .section-history h2 {
            font-size: 15px;
            margin: 0 0 6px 0;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }
        /* 歷史表格專屬滾動區 */
        .table-scroll {
            flex: 1;
            overflow-y: auto;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            table-layout: fixed;
        }
        .history-table th, .history-table td {
            padding: 5px 2px;
            text-align: left;
            border-bottom: 1px solid #b5a88f;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <h1>👨‍🍳 阿德師傅 - 即時出單系統</h1>

    <div class="controls">
        <div>狀態: <span id="sync-status" style="color: green; font-weight: bold;">● 即時連線中</span></div>
        <button class="refresh-btn" onclick="fetchOrders()">🔄 手動刷新</button>
    </div>

    <div class="dashboard-container">
        
        <div class="section-details">
            <h2>📋 當前接單明細 (新單置頂，超出版面可滾動)</h2>
            <div id="orders-container">正在下載最新出單資料...</div>
        </div>

        <div class="section-stats">
            <div class="stat-box">
                <div class="title">⏳ 待做訂單</div>
                <div class="num" id="stat-pending">0</div>
            </div>
            <div class="stat-box" style="border-left: 1px solid #ccc; border-right: 1px solid #ccc; padding: 0 15px;">
                <div class="title">✅ 已過單</div>
                <div class="num" id="stat-completed" style="color: #16a34a;">0</div>
            </div>
            <div class="stat-box">
                <div class="title">💰 今日營收</div>
                <div class="num" id="stat-revenue" style="color: #b45309;">$0</div>
            </div>
        </div>

        <div class="section-history">
            <h2><span>📜 歷史出單流水帳</span> <span id="history-count" style="font-size: 12px; color:#555;">共 0 筆</span></h2>
            <div class="table-scroll">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">單號</th>
                            <th style="width: 60%;">品項/客製摘要</th>
                            <th style="width: 20%;">金額</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr>
                            <td colspan="3" style="text-align: center; color: #888;">暫無紀錄</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const API_URL = 'https://xylwvlidaidtkvnivnrr.supabase.co/rest/v1/orders';
        const API_KEY = 'sb_publishable_RHa_jkWf5jWrxu6v8wo29A_8_tGr5Ar';

        // 💡 避開資料庫 RLS 封鎖：改用本地端瀏覽器記憶體儲存「已完成的訂單 ID」
        let completedOrderIds = JSON.parse(localStorage.getItem('completed_orders') || '[]');

        async function fetchOrders() {
            try {
                document.getElementById('sync-status').textContent = '🔄 讀取中...';
                document.getElementById('sync-status').style.color = '#b45309';

                const response = await fetch(`${API_URL}?order=id.desc`, {
                    method: 'GET',
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error("後台讀取失敗");
                const orders = await response.json();

                renderDashboard(orders);

                document.getElementById('sync-status').textContent = '● 即時連線中';
                document.getElementById('sync-status').style.color = 'green';
            } catch (err) {
                console.error(err);
                document.getElementById('sync-status').textContent = '❌ 連線失敗';
                document.getElementById('sync-status').style.color = 'red';
            }
        }

        function renderDashboard(orders) {
            const container = document.getElementById('orders-container');
            const tbody = document.getElementById('history-tbody');
            
            container.innerHTML = '';
            tbody.innerHTML = '';

            let pendingCount = 0;
            let completedCount = 0;
            let totalRevenue = 0;

            if (orders.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">目前尚無人點餐。</div>';
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888;">暫無紀錄</td></tr>';
                return;
            }

            orders.forEach(order => {
                const formattedNum = String(order.id).padStart(3, '0');
                
                // 💡 判斷方式：如果這個 ID 存在於我們本地的完成清單中，它就是已過單
                const isFinished = completedOrderIds.includes(order.id);

                if (isFinished) {
                    completedCount++;
                    totalRevenue += order.total_price;
                } else {
                    pendingCount++;
                }

                // --- 1. 渲染頂部明細卡片 ---
                const card = document.createElement('div');
                card.className = `order-card ${isFinished ? 'status-success' : ''}`;
                
                let itemsHtml = '';
                if (Array.isArray(order.items)) {
                    order.items.forEach(i => {
                        let customText = i.customization && i.customization.length > 0 ? ` [${i.customization.join(', ')}]` : '';
                        let noteText = i.note ? `<span class="order-item-note">✍️ 客人備註：${i.note}</span>` : '';
                        
                        itemsHtml += `
                            <li style="margin-bottom: 4px;">
                                <strong>${i.item === 'Porchetta' ? '義式脆皮烤豬' : '但丁三明治'}</strong> ${i.size || ''} 
                                <span style="color:#b45309;">${customText}</span>
                                ${noteText}
                            </li>`;
                    });
                }

                let actionButtonHtml = '';
                if (!isFinished) {
                    actionButtonHtml = `<button class="action-btn" onclick="localMarkAsComplete(${order.id})">✔️ 完成出餐</button>`;
                } else {
                    // 🎯 成功交易標籤 (20px 四字等寬固定寬度，絕不走樣)
                    actionButtonHtml = `<span class="status-label" style="color: #16a34a;">交易成功</span>`;
                }

                card.innerHTML = `
                    <div class="order-header">
                        <span>單號 #${formattedNum}</span>
                        <span style="color:#b45309;">$${order.total_price}</span>
                    </div>
                    <ul class="order-items-list">${itemsHtml}</ul>
                    <div style="text-align: right; margin-top: 4px;">
                        ${actionButtonHtml}
                    </div>
                `;
                container.appendChild(card);

                // --- 2. 渲染底部歷史流水帳 ---
                const tr = document.createElement('tr');
                let summary = '';
                if (Array.isArray(order.items) && order.items.length > 0) {
                    summary = order.items.map(i => i.item === 'Porchetta' ? '烤豬' : '三明治').join('+');
                    if (order.items.some(i => i.note)) {
                        summary += '(備註)';
                    }
                }

                tr.innerHTML = `
                    <td><strong>#${formattedNum}</strong></td>
                    <td style="color:#555;">${summary}</td>
                    <td><span style="color:${isFinished ? 'green':'#b45309'}; font-weight:bold;">$${order.total_price}</span></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('stat-pending').textContent = pendingCount;
            document.getElementById('stat-completed').textContent = completedCount;
            document.getElementById('stat-revenue').textContent = `$${totalRevenue}`;
            document.getElementById('history-count').textContent = `共 ${orders.length} 筆`;
        }

        // 💡 點擊按鈕改記在手機本地瀏覽器裡，完美繞過 RLS 錯誤！
        function localMarkAsComplete(orderId) {
            if (!completedOrderIds.includes(orderId)) {
                completedOrderIds.push(orderId);
                localStorage.setItem('completed_orders', JSON.stringify(completedOrderIds));
            }
            fetchOrders();
        }

        setInterval(fetchOrders, 6000);
        window.onload = fetchOrders;
    </script>
</body>
</html>
