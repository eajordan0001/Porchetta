<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿德師傅 - 現場出單管理系統</title>
    <style>
        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: #f0e6d2;
            color: #4a2f1c;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
            background-color: #ffffff;
            padding: 15px;
            border: 5px solid #a67c52;
            border-radius: 8px;
        }
        h1 { margin: 0; font-size: 24px; }
        
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* 訂單卡片基礎樣式 */
        .order-card {
            background-color: #f7f3e9;
            border: 3px solid #a67c52;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        /* ✨【核心優化 1】：最上面第一筆（優先）的特大號字體樣式 */
        .order-list .order-card:first-child {
            border: 5px solid #dc2626; /* 優先訂單用紅色粗邊框提醒 */
            background-color: #fffef0;
        }
        .order-list .order-card:first-child .priority-badge {
            display: inline-block;
            background-color: #dc2626;
            color: #ffffff;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 24px; /* 比平常大很多 */
            margin-bottom: 10px;
            animation: blink 1.5s infinite;
        }
        .order-list .order-card:first-child .order-id {
            font-size: 36px; /* 單號放大 1.5 倍以上 */
            color: #dc2626;
            font-weight: 900;
        }
        .order-list .order-card:first-child .order-time,
        .order-list .order-card:first-child .item-line {
            font-size: 22px; /* 明細與時間同步放大 */
            line-height: 1.6;
        }

        /* 平常訂單的常規字體大小 */
        .priority-badge { display: none; }
        .order-id {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px dashed #a67c52;
            padding-bottom: 5px;
        }
        .order-time {
            font-size: 14px;
            color: #78350f;
            margin-bottom: 15px;
        }
        .order-items {
            margin-bottom: 20px;
        }
        .item-line {
            font-size: 16px;
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 3px solid #4a2f1c;
        }

        /* ✨【核心優化 2】：極大化完成出餐按鈕，方便廚師操作 */
        .complete-btn {
            display: block;
            width: 100%;
            padding: 20px 10px; /* 大幅增加上下點擊寬度 */
            background-color: #16a34a;
            color: #ffffff;
            border: none;
            font-size: 24px; /* 字體放大，清晰好按 */
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 0 #15803d;
            text-align: center;
            user-select: none;
        }
        .complete-btn:active {
            background-color: #15803d;
            box-shadow: 0 1px 0 #15803d;
            transform: translateY(3px);
        }

        /* 第一筆訂單的按鈕可以更大更醒目 */
        .order-list .order-card:first-child .complete-btn {
            background-color: #dc2626;
            box-shadow: 0 4px 0 #991b1b;
        }
        .order-list .order-card:first-child .complete-btn:active {
            background-color: #991b1b;
            box-shadow: 0 1px 0 #991b1b;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>👨‍🍳 阿德師傅餐車 - 現場出單明細</h1>
            <div id="loading-status" style="font-size:14px; color:#666; margin-top:5px;">正在連線資料庫...</div>
        </header>

        <div class="order-list" id="order-container">
            </div>
    </div>

    <script>
        const API_URL = 'https://xylwvlidaidtkvnivnrr.supabase.co/rest/v1/orders';
        const API_KEY = 'sb_publishable_RHa_jkWf5jWrxu6v8wo29A_8_tGr5Ar';

        // 🔄 初始化載入與即時重整
        async function fetchOrders() {
            try {
                document.getElementById('loading-status').textContent = "正在即時更新訂單中...";
                
                // 撈取所有未處理的訂單（依照時間先後排序，舊的在上面優先出餐）
                const response = await fetch(`${API_URL}?status=eq.pending&order=created_at.asc`, {
                    method: 'GET',
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`
                    }
                });

                if (!response.ok) throw new Error("資料庫連線失敗");
                const orders = await response.json();
                
                // ✨【核心除錯】：動態計算每一筆訂單「當天的獨立單號」，讓前後端完全同步！
                // 為了精準算出單號，我們需要知道每張訂單在其建立當天是第幾筆
                const renderedOrders = [];
                
                for(let i = 0; i < orders.length; i++) {
                    const order = orders[i];
                    
                    // 取得該筆訂單的台灣當天日期字串
                    const createdAt = new Date(order.created_at);
                    const twTime = new Date(createdAt.getTime() + (8 * 60 * 60 * 1000));
                    const orderDateStr = twTime.toISOString().split('T')[0];
                    
                    // 去資料庫撈取這筆訂單「之前」，當天總共有多少筆訂單
                    // 這樣就算前面有些單子已經被點選「完成出餐(status變更)」而消失，算出來的單號依然會是永久固定且正確的！
                    const dayCountUrl = `${API_URL}?created_at=gte.${orderDateStr}T00:00:00Z&created_at=lt.${order.created_at}&select=id`;
                    const countRes = await fetch(dayCountUrl, {
                        method: 'GET',
                        headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}` }
                    });
                    
                    let dayIndex = 0;
                    if (countRes.ok) {
                        const historyOrders = await countRes.json();
                        dayIndex = historyOrders.length; 
                    }
                    
                    // 今日單號 = 在這筆訂單之前建立的單數 + 1
                    const formattedNum = String(dayIndex + 1).padStart(3, '0');
                    renderedOrders.push({ ...order, dailyNumber: formattedNum });
                }

                renderOrderList(renderedOrders);
                document.getElementById('loading-status').textContent = `最後更新時間：${new Date().toLocaleTimeString()} (每 10 秒自動同步)`;

            } catch (error) {
                console.error(error);
                document.getElementById('loading-status').textContent = "⚠️ 連線失敗，正試圖重新連線中...";
            }
        }

        // 🎨 渲染出單畫面到畫面上
        function renderOrderList(orders) {
            const container = document.getElementById('order-container');
            container.innerHTML = '';

            if (orders.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; font-size:18px; color:#888; background:#fff; border-radius:8px; border:2px dashed #a67c52;">🎉 報告主廚！目前沒有未出餐的訂單，可以稍作休息！</div>';
                return;
            }

            orders.forEach((order, index) => {
                const card = document.createElement('div');
                card.className = 'order-card';

                // 解析時間
                const time = new Date(order.created_at).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
                
                // 生成品項明細清單 DOM
                let itemsHtml = '';
                if (Array.isArray(order.items)) {
                    order.items.forEach(item => {
                        let customStr = item.customization && item.customization.length > 0 ? ` [${item.customization.join(', ')}]` : '';
                        let noteStr = item.note ? ` <span style="color:#b45309; font-weight:bold;">(備註: ${item.note})</span>` : '';
                        itemsHtml += `<div class="item-line">🔹 ${item.item === 'Porchetta' ? '義式脆皮烤豬' : '但丁三明治'} ${item.size} x 1區 - $${item.price}${customStr}${noteStr}</div>`;
                    });
                }

                // 填入卡片內容 (最上面第一筆 index 為 0，會自動套用 CSS 放大 1.5 倍的規則)
                card.innerHTML = `
                    <div class="priority-badge">🚨 優先出餐</div>
                    <div class="order-id">今日編號：#${order.dailyNumber}</div>
                    <div class="order-time">收單時間：${time} ｜ 總金額：$${order.total_price}</div>
                    <div class="order-items">${itemsHtml}</div>
                    <button class="complete-btn" onclick="completeOrder('${order.id}', this)">✔ 完成出餐</button>
                `;

                container.appendChild(card);
            });
        }

        // 🚀 廚師點擊「完成出餐」按鈕：將狀態從 pending 改為 completed
        async function completeOrder(orderId, buttonEl) {
            if (!confirm("確定這筆餐點已經製作完成，要核銷出單嗎？")) return;
            
            // 點擊後立刻把按鈕文字改成處理中，防止重覆狂點
            buttonEl.disabled = true;
            buttonEl.textContent = "⏱ 處理中...";

            try {
                const response = await fetch(`${API_URL}?id=eq.${orderId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': API_KEY,
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({ status: 'completed' })
                });

                if (response.ok) {
                    // 成功後立刻重新撈取，保持畫面最新狀態
                    fetchOrders();
                } else {
                    alert("核銷失敗，請重新再試一次！");
                    buttonEl.disabled = false;
                    buttonEl.textContent = "✔ 完成出餐";
                }
            } catch (error) {
                alert("網路異常，無法變更出餐狀態！");
                buttonEl.disabled = false;
                buttonEl.textContent = "✔ 完成出餐";
            }
        }

        // ⏱ 設定每 10 秒鐘自動幫老闆重新抓取一次最新訂單，免手動對帳
        fetchOrders();
        setInterval(fetchOrders, 10000);
    </script>
</body>
</html>
