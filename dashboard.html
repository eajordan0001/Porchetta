</head>
<body>

<div class="container">
    <header>
        <h1>👨‍🍳 阿德師傅餐車 - 現場出單明細</h1>
        <div id="loading-status" style="font-size:14px; color:#666; margin-top:5px;">正在連線資料庫...</div>
    </header>
    <div class="order-list" id="order-container"></div>
</div>

<script>
    const API_URL = 'https://xylwvlidaidtkvnivnrr.supabase.co/rest/v1/orders';
    const API_KEY = 'sb_publishable_RHa_jkWf5jWrxu6v8wo29A_8_tGr5Ar';

    // 各張訂單的確認狀態
    const confirmStates = {};

    // 🔄 載入待出餐訂單
    async function fetchOrders() {
        try {
            document.getElementById('loading-status').textContent = '正在即時更新訂單中...';

            const response = await fetch(`${API_URL}?status=eq.pending&order=created_at.asc`, {
                headers: {
                    'apikey': API_KEY,
                    'Authorization': `Bearer ${API_KEY}`
                }
            });

            if (!response.ok) throw new Error('資料庫拒絕回應');

            const orders = await response.json();
            renderOrderList(orders);

            const timeStr = new Date().toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei' });
            document.getElementById('loading-status').textContent = `最後更新：${timeStr}（每 10 秒自動同步）`;

        } catch (error) {
            console.error(error);
            document.getElementById('loading-status').textContent = '⚠️ 連線異常，將於 10 秒後自動重試...';
        }
    }

    // 🎨 渲染出單畫面
    function renderOrderList(orders) {
        const container = document.getElementById('order-container');
        container.innerHTML = '';

        if (orders.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; font-size:18px; color:#888; background:#fff; border-radius:8px; border:2px dashed #a67c52;">🎉 報告主廚！目前沒有未出餐的訂單，可以稍作休息！</div>';
            return;
        }

        orders.forEach(order => {
            const card = document.createElement('div');
            card.className = 'order-card';

            // ✅ 時區修正：created_at 是 UTC，轉換成台灣時間顯示
            const twTime = new Date(new Date(order.created_at).getTime() + 8 * 60 * 60 * 1000);
            const timeStr = twTime.toISOString().substring(11, 16); // HH:MM

            // ✅ daily_number 直接從資料庫讀取，不需要任何計算
            const dailyNum = String(order.daily_number).padStart(3, '0');

            // ✅ 客戶資訊從獨立欄位讀取
            const customerBadge = order.customer_name
                ? `<span class="customer-badge">👤 ${order.customer_name}（末三碼：${order.customer_phone}）</span>`
                : '';

            let itemsHtml = '';
            if (Array.isArray(order.items)) {
                order.items.forEach(item => {
                    const itemName = item.item === 'Porchetta' ? '義式脆皮烤豬' : '但丁三明治';
                    const customStr = item.customization && item.customization.length > 0
                        ? ` [${item.customization.join(', ')}]` : '';
                    const noteStr = item.note
                        ? ` <span style="color:#b45309; font-weight:bold;">（備註: ${item.note}）</span>` : '';
                    itemsHtml += `<div class="item-line">🔹 ${itemName} ${item.size} - $${item.price}${customStr}${noteStr}</div>`;
                });
            }

            card.innerHTML = `
                <div class="priority-badge">🚨 優先出餐</div>
                <div class="order-id">單號：#${dailyNum}${customerBadge}</div>
                <div class="order-time">收單時間：${timeStr} ｜ 總金額：$${order.total_price}</div>
                <div class="order-items">${itemsHtml}</div>
                <button class="complete-btn" id="btn-${order.id}" onclick="handleCompleteBtn('${order.id}')">
                    ✔ 完成出餐
                </button>
            `;

            container.appendChild(card);
        });
    }

    // 🚀 行內二次確認出餐（取代 confirm()）
    function handleCompleteBtn(orderId) {
        const btn = document.getElementById(`btn-${orderId}`);

        if (!confirmStates[orderId]) {
            // 第一次按：提示再按一次
            confirmStates[orderId] = true;
            btn.textContent = '⚠️ 再按一次確認完成出餐';
            btn.classList.add('confirming');

            // 5 秒後自動還原
            setTimeout(() => {
                if (confirmStates[orderId]) {
                    confirmStates[orderId] = false;
                    if (btn) {
                        btn.textContent = '✔ 完成出餐';
                        btn.classList.remove('confirming');
                    }
                }
            }, 5000);

        } else {
            // 第二次按：正式核銷
            confirmStates[orderId] = false;
            completeOrder(orderId, btn);
        }
    }

    // 📡 送出核銷請求
    async function completeOrder(orderId, btn) {
        btn.disabled = true;
        btn.textContent = '⏱ 處理中...';
        btn.classList.remove('confirming');

        try {
            const response = await fetch(`${API_URL}?id=eq.${orderId}`, {
                method: 'PATCH',
                headers: {
                    'apikey': API_KEY,
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                },
                body: JSON.stringify({ status: 'completed' })
            });

            if (response.ok) {
                fetchOrders();
            } else {
                alert('核銷失敗，請重新再試一次！');
                btn.disabled = false;
                btn.textContent = '✔ 完成出餐';
            }
        } catch (error) {
            alert('網路異常，無法變更出餐狀態！');
            btn.disabled = false;
            btn.textContent = '✔ 完成出餐';
        }
    }

    // ⏱ 啟動系統
    fetchOrders();
    setInterval(fetchOrders, 10000);
</script>

</body>
</html>
