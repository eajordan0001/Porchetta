<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿德師傅 - 手機直式點餐菜單 (PWA版)</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Service Worker 註冊成功！', reg))
                    .catch(err => console.log('註冊失敗：', err));
            });
        }
    </script>

    <style>
        /* 核心手機直式優化：無左右滑動，大字級 */
        body {
            margin: 0;
            font-family: "Segoe Script", "Apple Chancery", cursive, "Noto Sans TC", sans-serif;
            background-color: #f0e6d2; /* 復古紙張顏色 */
            color: #4a2f1c;
            overflow-x: hidden; /* 防止橫向捲動 */
        }
        .menu-container {
            max-width: 480px; /* 適合大手機屏幕 */
            margin: 0 auto;
            background-color: #f7f3e9; /* 表格顏色 */
            border: 15px solid #a67c52; /* 紋理木板邊框 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            padding-bottom: 100px; /* 為固定購物車留出空間 */
            position: relative;
        }

        /* Header 區塊 */
        header {
            text-align: center;
            padding: 20px;
            background-color: #ffffff;
        }
        header .logo-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: 12px;
            color: #666;
        }
        header h1 {
            font-size: 24px;
            margin: 10px 0 0;
        }

        /* 商品項目區塊 */
        .menu-item {
            padding: 20px;
            border-bottom: 2px solid #a67c52;
            overflow: hidden;
        }
        .item-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .item-header .img-placeholder {
            width: 100px;
            height: 100px;
            margin-right: 15px;
            border-radius: 8px;
            background-color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
        }
        .item-header h2 {
            font-size: 20px;
            margin: 0;
        }

        /* 客製化按鈕（大且防呆） */
        .custom-options, .size-select {
            margin: 15px 0;
        }
        .custom-options label, .size-select label {
            display: inline-block;
            padding: 10px 15px;
            background-color: #e6dfc7;
            border: 1px solid #a67c52;
            margin-right: 5px;
            cursor: pointer;
            border-radius: 4px;
            user-select: none;
        }
        .custom-options input:checked + label, .size-select input:checked + label {
            background-color: #a67c52;
            color: #ffffff;
            border-color: #4a2f1c;
        }
        .custom-options input, .size-select input {
            display: none; /* 隱藏真實 input */
        }

        .item-description {
            font-size: 16px;
            line-height: 1.4;
            margin-bottom: 15px;
        }

            display: block;
            width: 100%;

            color: #ffffff;
