<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阿德師傅 - 純在地極簡測試版</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f0e6d2; color: #4a2f1c; padding: 20px; }
        .menu-container { max-width: 480px; margin: 0 auto; background: #f7f3e9; border: 5px solid #a67c52; padding: 15px; }
        .menu-item { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .add-cart-btn { display: block; width: 100%; padding: 15px; background: #4a2f1c; color: white; border: none; font-size: 18px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .fixed-cart { position: fixed; bottom: 0; left: 0; width: 100%; background: #4a2f1c; color: white; padding: 15px; font-size: 20px; display: flex; justify-content: space-between; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- 🚨 強制核心除錯：最上層直接放一粒傳統 onClick 按鈕當對照組 -->
    <div style="background: red; color: white; padding: 10px; text-align: center; margin-bottom: 20px; font-weight: bold; border-radius: 4px;" 
         onclick="alert('傳統 HTML 點擊成功！代表網頁沒有凍結！')">
         防呆測試：點擊此處測試網頁是否凍結
    </div>

    <div class="menu-container">
        <h2>阿德師傅餐車 (在地測試版)</h2>
        
        <div class="menu-item">
            <h3>義式脆皮烤豬 ($300)</h3>
            <button class="add-cart-btn" onclick="testAddToCart(300, this)">➕ 加入購物車</button>
        </div>

        <div class="menu-item">
            <h3>但丁三明治 ($170)</h3>
            <button class="add-cart-btn" onclick="testAddToCart(170, this)">➕ 加入購物車</button>
        </div>
    </div>

    <div class="fixed-cart">
        <span id="test-count">🛒 已點項目: 0 項</span>
        <span id="test-total">總金額: $0</span>
    </div>

    <script>
        // 🛑 1. 暴力清除所有可能死鎖的 PWA 快取與 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let registration of registrations) {
                    registration.unregister().then(js => console.log('強制登出舊SW成功'));
                }
            });
        }

        // 🛑 2. 一載入立刻彈窗，確認手機有沒有吃到這一版
        window.onload = function() {
            alert("【最新極簡測試版】已成功載入！如果點按鈕還是沒反應，請看下方叮嚀。");
        };

        let testCart = { count: 0, total: 0 };

        // 🛑 3. 最純粹的計算與畫面更新
        function testAddToCart(price, btn) {
            try {
                testCart.count += 1;
                testCart.total += price;

                // 直接更新畫面
                document.getElementById('test-count').textContent = `🛒 已點項目: ${testCart.count} 項`;
                document.getElementById('test-total').textContent = `總金額: $${testCart.total}`;

                if (btn) {
                    btn.textContent = "核心成功！";
                    setTimeout(() => { btn.textContent = "➕ 加入購物車"; }, 1000);
                }
            } catch (err) {
                alert("點擊觸發了，但更新畫面失敗: " + err.message);
            }
        }
    </script>
</body>
</html>
